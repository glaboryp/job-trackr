name: Deploy InsForge Function

on:
  push:
    branches:
      - main
    paths:
      - insforge/functions/reconcile-applications/**
      - .github/workflows/insforge-functions.yml
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: insforge-reconcile-applications
  cancel-in-progress: true

jobs:
  deploy-reconcile-applications:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Deploy function (using access token)
        env:
          INSFORGE_ACCESS_TOKEN: ${{ secrets.INSFORGE_ACCESS_TOKEN }}
          INSFORGE_PROJECT_ID: ${{ secrets.INSFORGE_PROJECT_ID }}
        run: |
          npx --yes @insforge/cli --project-id "$INSFORGE_PROJECT_ID" functions deploy reconcile-applications --file ./insforge/functions/reconcile-applications/index.ts --json -y